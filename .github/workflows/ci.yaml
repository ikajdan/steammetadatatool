name: CI

on:
  push:
    branches:
      - main
    paths-ignore:
      - "**/*.md"
    tags:
      - "v*"
  pull_request:
    paths-ignore:
      - "**/*.md"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  checks:
    name: Checks
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true

      - name: Install required packages
        run: |
          sudo apt-get update
          sudo apt-get install --assume-yes --no-install-recommends \
            appstream \
            desktop-file-utils
          python -m pip install --upgrade reuse

      - name: Validate desktop file
        run: desktop-file-validate data/io.github.ikajdan.steammetadatatool.desktop

      - name: Validate AppStream metadata
        run: appstreamcli validate --no-net data/io.github.ikajdan.steammetadatatool.metainfo.xml

      - name: Check REUSE compliance
        run: reuse lint

      - name: Check Python formatting
        run: uvx ruff format --check .

      - name: Check Python linting
        run: uvx ruff check .

      - name: Build package
        run: uv build

  appimage:
    name: AppImage
    runs-on: ubuntu-latest
    needs: checks
    if: github.event_name == 'push' && github.ref_type == 'tag'

    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Build AppImage
        env:
          APP_VERSION: ${{ github.ref_name }}
        run: APP_VERSION="${APP_VERSION#v}" ./tools/build-appimage.sh

      - name: Upload AppImage to release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          files: build/appimage/*.AppImage
          fail_on_unmatched_files: true
